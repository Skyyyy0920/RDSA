# RDSA Training Config — Qwen3-VL-8B-Instruct (Primary Surrogate)

model:
  name: "Qwen/Qwen3-VL-8B-Instruct"
  architecture: "qwen3vl"
  hidden_dim: 4096
  num_layers: 32
  model_class: "Qwen3VLForConditionalGeneration"
  layer_access_path: "model.language_model.layers"
  layer_groups:
    - [8, 9, 10, 11, 12]    # Mid-early
    - [16, 17, 18, 19, 20]  # Mid-late
    - [24, 25, 26, 27, 28]  # Deep

subspace:
  d_safe: 32          # Safety subspace dim (d_s/d ≈ 0.8%)
  d_semantic: 256     # Semantic subspace dim
  n_contrast_samples: 2000   # Samples for SVD
  n_semantic_samples: 5000   # Samples for PCA

training:
  # LoRA — includes attention + MLP for broader safety feature coverage
  lora_rank: 16
  lora_alpha: 32
  lora_target_modules: ["q_proj", "v_proj", "k_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
  lora_dropout: 0.05

  # Optimization
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.03
  num_epochs: 5
  per_device_batch_size: 4
  gradient_accumulation_steps: 2
  max_grad_norm: 1.0
  fp16: false
  bf16: true           # Qwen3-VL prefers bf16
  gradient_checkpointing: true

  # SA-AT loss weights
  alpha_sa_at: 0.3
  alpha_consist: 0.05
  alpha_entangle: 0.1    # Entanglement regularization

  # SA-AT PGD parameters
  sa_at_pgd_steps: 7
  sa_at_pgd_alpha: 0.1
  sa_at_epsilon: 1.0
  sa_at_num_restarts: 3         # PGD random restarts
  sa_at_epsilon_relative: true   # Scale epsilon by activation norm
  sa_at_epsilon_ratio: 0.05     # epsilon = 0.05 * mean_activation_norm

  # SA-AT warmup: pure SFT for first epoch before adversarial training
  sa_at_warmup_epochs: 1

  # Subspace re-identification every 100 optimizer steps (0 = epoch-only)
  subspace_update_interval: 100

  # Consistency loss only on harmful samples (reduces over-refusal)
  consist_harmful_only: true

  # Hook all layers in each group, not just representative
  hook_all_group_layers: true

  # Data balance
  harmful_benign_ratio: 1.0   # 1:1 ratio

monitor:
  threshold: 0.2
  conservative_mode: true

data:
  harmful_dataset: "walledai/StrongReject"
  benign_dataset: "HuggingFaceM4/VQAv2"
  advbench_path: "data/advbench.csv"
  contrast_safe_path: "data/safe_prompts.jsonl"
  contrast_unsafe_path: "data/unsafe_prompts.jsonl"

evaluation:
  judge_model: "gpt-4o"
  attacks:
    - scia
    - umk
    - vajm
    - figstep
  benchmarks:
    - vqav2
    - mmbench
    - mme
    - orbench

logging:
  project: "rdsa"
  entity: null
  run_name: "qwen3-vl-8b-rdsa"
  log_every_n_steps: 10

output:
  save_dir: "outputs/qwen3-vl-8b"
  subspace_dir: "subspaces/qwen3-vl-8b"
  save_every_n_epochs: 1
