# RDSA Training Config — LLaVA-v1.6-Mistral-7B

model:
  name: "llava-hf/llava-v1.6-mistral-7b-hf"
  architecture: "llava"
  hidden_dim: 4096
  num_layers: 32
  layer_groups:
    - [10, 11, 12, 13, 14]  # Mid-early
    - [18, 19, 20, 21, 22]  # Mid-late
    - [26, 27, 28, 29, 30]  # Deep

subspace:
  d_safe: 32          # Safety subspace dim (d_s/d ≈ 0.8%)
  d_semantic: 256     # Semantic subspace dim
  n_contrast_samples: 2000   # Samples for SVD
  n_semantic_samples: 5000   # Samples for PCA

training:
  # LoRA
  lora_rank: 16
  lora_alpha: 32
  lora_target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]
  lora_dropout: 0.05

  # Optimization
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  num_epochs: 3
  per_device_batch_size: 4
  gradient_accumulation_steps: 2
  max_grad_norm: 1.0
  fp16: true
  gradient_checkpointing: true

  # Loss weights
  alpha_entangle: 0.1
  alpha_consist: 0.05
  alpha_lat_sub: 0.1

  # Subspace-aware LAT
  lat_perturbation_alpha: 0.1

  # Data balance
  harmful_benign_ratio: 1.0   # 1:1 ratio

monitor:
  threshold: 0.2
  conservative_mode: true

data:
  harmful_dataset: "walledai/StrongReject"
  benign_dataset: "HuggingFaceM4/VQAv2"
  advbench_path: "data/advbench.csv"
  contrast_safe_path: "data/safe_prompts.jsonl"
  contrast_unsafe_path: "data/unsafe_prompts.jsonl"

evaluation:
  judge_model: "gpt-4o"
  attacks:
    - scia
    - umk
    - vajm
    - figstep
  benchmarks:
    - vqav2
    - mmbench
    - mme
    - orbench

logging:
  project: "rdsa"
  entity: null
  run_name: "llava-v1.6-rdsa"
  log_every_n_steps: 10

output:
  save_dir: "outputs/llava-v1.6"
  subspace_dir: "subspaces/llava-v1.6"
  save_every_n_epochs: 1
