# RDSA Training Config — LLaMA-3.2-11B-Vision-Instruct (Retained Surrogate)

model:
  name: "meta-llama/Llama-3.2-11B-Vision-Instruct"
  architecture: "llama_vision"
  hidden_dim: 4096
  num_layers: 32
  model_class: "MllamaForConditionalGeneration"
  layer_access_path: "model.language_model.layers"
  layer_groups:
    - [8, 9, 10, 11, 12]    # Mid-early
    - [16, 17, 18, 19, 20]  # Mid-late
    - [24, 25, 26, 27, 28]  # Deep

subspace:
  d_safe: 32          # Safety subspace dim (d_s/d ≈ 0.8%)
  d_semantic: 256     # Semantic subspace dim
  n_contrast_samples: 2000
  n_semantic_samples: 5000

training:
  # LoRA
  lora_rank: 16
  lora_alpha: 32
  lora_target_modules: ["q_proj", "v_proj", "k_proj", "o_proj"]
  lora_dropout: 0.05

  # Optimization
  learning_rate: 1.0e-5  # Lower LR for 11B model
  weight_decay: 0.01
  warmup_ratio: 0.1
  num_epochs: 3
  per_device_batch_size: 2  # Smaller batch for 11B model
  gradient_accumulation_steps: 4  # Compensate with more accumulation
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  gradient_checkpointing: true

  # Loss weights
  alpha_entangle: 0.1
  alpha_consist: 0.05
  alpha_lat_sub: 0.1

  # Subspace-aware LAT
  lat_perturbation_alpha: 0.1

  # Data balance
  harmful_benign_ratio: 1.0

monitor:
  threshold: 0.2
  conservative_mode: true

data:
  harmful_dataset: "walledai/StrongReject"
  benign_dataset: "HuggingFaceM4/VQAv2"
  advbench_path: "data/advbench.csv"
  contrast_safe_path: "data/safe_prompts.jsonl"
  contrast_unsafe_path: "data/unsafe_prompts.jsonl"

evaluation:
  judge_model: "gpt-4o"
  attacks:
    - scia
    - umk
    - vajm
    - figstep
  benchmarks:
    - vqav2
    - mmbench
    - mme
    - orbench

logging:
  project: "rdsa"
  entity: null
  run_name: "llama-3.2-11b-rdsa"
  log_every_n_steps: 10

output:
  save_dir: "outputs/llama-3.2-11b"
  subspace_dir: "subspaces/llama-3.2-11b"
  save_every_n_epochs: 1
